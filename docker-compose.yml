services:
  searxng:
    image: searxng/searxng:latest
    profiles: ["local-infra"]
    ports:
      - "8080:8080"
    environment:
      - BASE_URL=http://localhost:8080/
      - INSTANCE_NAME=ArtBot Local Search
    restart: unless-stopped

  api:
    build: .
    command: pnpm --filter @artbot/api start
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      - worker

  worker:
    build: .
    command: pnpm --filter @artbot/worker start
    env_file:
      - .env

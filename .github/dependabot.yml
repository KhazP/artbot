version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      workspace-dependencies:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    labels:
      - ci
      - dependencies

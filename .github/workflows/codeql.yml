name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.8.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build internal types first
        run: pnpm --filter @artbot/shared-types build

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Check code scanning availability
        id: code-scanning
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status="$(curl -sS -o /tmp/code-scanning-response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/code-scanning/alerts?per_page=1")"

          if [ "${status}" -ge 200 ] && [ "${status}" -lt 300 ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "enabled=false" >> "${GITHUB_OUTPUT}"
          echo "Code scanning API unavailable (HTTP ${status}); skipping CodeQL SARIF upload."
          echo "Enable Code scanning in repository settings to publish results."

      - name: Perform CodeQL Analysis
        if: steps.code-scanning.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

      - name: Report skipped CodeQL upload
        if: steps.code-scanning.outputs.enabled != 'true'
        run: |
          echo "Skipped CodeQL upload because Code scanning is disabled or inaccessible for this run context."

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build internal types first
        run: pnpm --filter @artbot/shared-types build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify Published CLI Install Path
        run: pnpm --filter artbot verify:install

      - name: Pack CLI
        run: |
          mkdir -p /tmp/artbot-pack
          cd apps/cli
          npm_config_cache=/tmp/artbot-npm-cache npm pack --pack-destination /tmp/artbot-pack

      - name: Smoke test packed install
        run: |
          set -euo pipefail
          API_BASE_URL=http://127.0.0.1:4100
          export ARTBOT_HOME=/tmp/artbot-home
          rm -rf /tmp/artbot-install "$ARTBOT_HOME"
          mkdir -p /tmp/artbot-install
          TARBALL="$(ls /tmp/artbot-pack/artbot-*.tgz)"

          cleanup() {
            if [ -x /tmp/artbot-install/node_modules/.bin/artbot ]; then
              ARTBOT_HOME="$ARTBOT_HOME" /tmp/artbot-install/node_modules/.bin/artbot --api-base-url "$API_BASE_URL" backend stop >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          npm_config_cache=/tmp/artbot-npm-cache npm install --prefix /tmp/artbot-install "$TARBALL"
          ARTBOT_HOME="$ARTBOT_HOME" /tmp/artbot-install/node_modules/.bin/artbot --help
          ARTBOT_HOME="$ARTBOT_HOME" /tmp/artbot-install/node_modules/.bin/artbot --api-base-url "$API_BASE_URL" backend start
          ARTBOT_HOME="$ARTBOT_HOME" /tmp/artbot-install/node_modules/.bin/artbot --json --api-base-url "$API_BASE_URL" backend status
          ARTBOT_HOME="$ARTBOT_HOME" /tmp/artbot-install/node_modules/.bin/artbot --json --api-base-url "$API_BASE_URL" runs list
